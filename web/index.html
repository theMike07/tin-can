  <!-- Passkeys Web SDK — wymagane przez passkeys_web (tranzytywna zależność
       supabase_flutter). Bez tego apka rzuca "Passkeys Web SDK not loaded"
       i nie startuje na web. Ładujemy synchronicznie, przed flutter_bootstrap. -->
  <script src="bundle.js"></script>

  <!-- Krótki "ding" przy odebraniu rysunku (Web Audio, bez plików audio).
       Wołane z Darta przez js_interop jako window.tinCanChime(). -->
  <script>
    window.tinCanChime = function () {
      try {
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        window.__tinCanAudio = window.__tinCanAudio || new Ctx();
        var ctx = window.__tinCanAudio;
        if (ctx.state === 'suspended') ctx.resume();
        var now = ctx.currentTime;
        [[880, 0.0], [1320, 0.12]].forEach(function (pair) {
          var o = ctx.createOscillator();
          var g = ctx.createGain();
          o.type = 'sine';
          o.frequency.value = pair[0];
          o.connect(g); g.connect(ctx.destination);
          var t = now + pair[1];
          g.gain.setValueAtTime(0.0001, t);
          g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
          o.start(t); o.stop(t + 0.26);
        });
      } catch (e) {}
    };
  </script>
</head>
<body>

</body>
