# Codemagic — build iOS „Tin Can" i wysyłka na TestFlight (bez Maca).
#
# Klucz App Store Connect w Codemagic pod nazwą „Codemagic" — MUSI mieć rolę
# ADMIN (App Manager nie tworzy certyfikatów podpisujących).
# APP_STORE_APPLE_ID = Apple ID apki (App Store Connect → App Information).
# Automatyczne podpisywanie Codemagic (ios_signing) samo tworzy i przechowuje
# certyfikat dystrybucyjny + profil App Store dla podanego bundle id.
# Build startujesz RĘCZNIE z panelu. Push (APNs/Firebase iOS) dodamy osobno.

workflows:
  ios-testflight:
    name: Tin Can — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic        # klucz App Store Connect (rola ADMIN)
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: pl.themike07.tincan
      vars:
        APP_STORE_APPLE_ID: 6792543062     # Apple ID apki
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Wyłącz Swift Package Manager (Firebase iOS na CocoaPods)
        script: flutter config --no-enable-swift-package-manager
      - name: Pakiety Flutter
        script: flutter pub get
      - name: Podpisywanie (certyfikat + profil z App Store Connect)
        script: xcode-project use-profiles
      - name: Build IPA (numer wersji z ostatniego builda TestFlight)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          flutter build ipa --release \
            --build-name=1.3.1 \
            --build-number=$((LATEST + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # wrzuca build prosto na TestFlight
