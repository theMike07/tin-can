# Codemagic — build iOS „Tin Can" i wysyłka na TestFlight (bez Maca).
#
# Klucz App Store Connect dodany w Codemagic pod nazwą „Codemagic".
# APP_STORE_APPLE_ID = Apple ID apki (App Store Connect → App Information).
# Build startujesz RĘCZNIE z panelu (nie pali minut na każdy push).
# Push (powiadomienia) celowo pominięte — apka zbuduje się i zadziała
# (rysowanie, czat, E2E, obrazki); APNs/Firebase iOS dodamy osobnym krokiem.

workflows:
  ios-testflight:
    name: Tin Can — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic        # nazwa klucza App Store Connect w Codemagic
    environment:
      vars:
        APP_STORE_APPLE_ID: 6792543062     # Apple ID apki
        BUNDLE_ID: pl.themike07.tincan
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Wyłącz Swift Package Manager (Firebase iOS stabilniej na CocoaPods)
        script: flutter config --no-enable-swift-package-manager
      - name: Pakiety Flutter
        script: flutter pub get
      - name: Podpisywanie — UTWÓRZ/pobierz certyfikat i profil App Store
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA (numer wersji z ostatniego builda TestFlight)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          flutter build ipa --release \
            --build-name=1.3.1 \
            --build-number=$((LATEST + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # wrzuca build prosto na TestFlight
